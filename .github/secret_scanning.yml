# agentlint is a secret-DETECTION linter: its test corpus and example data
# intentionally contain secret-shaped strings. Exclude those paths so GitHub
# secret scanning doesn't alert on them. (Push protection is handled by keeping
# no contiguous real-format literal in source — see the split fixtures.)
paths-ignore:
  - "packages/core/test/**"
  - "packages/core/src/rules/util.ts"
  - "apps/web/tests/**"
  - "apps/web/src/lib/examples.ts"
  - "fixtures/**"
  - "docs/**"
