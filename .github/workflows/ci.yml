name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build the engine first (the CLI and web app depend on its dist output).
      - name: Build agentlint-core
        run: npm run build -w agentlint-core

      - name: Build agentlint CLI
        run: npm run build -w agentlint-cli

      - name: Build @agentlint/web
        run: npm run build -w @agentlint/web

      - name: Type-check
        run: npm run typecheck

      # Generated files (rule docs + the unified catalog emitted to web & CLI)
      # must match their generators — a hand-edit or stale commit fails here.
      - name: Verify generated files are in sync
        run: |
          npm run gen:catalog
          npm run gen:rules
          npm run gen:rules-content
          git diff --exit-code -- \
            docs/RULES.md \
            apps/web/src/lib/rules-content.ts \
            apps/web/src/lib/catalog.generated.ts \
            packages/cli/src/catalog.generated.ts

      - name: Test agentlint-core
        run: npm run test -w agentlint-core

      - name: Test agentlint CLI
        run: npm run test -w agentlint-cli

      - name: Test @agentlint/web (unit)
        run: npm run test -w @agentlint/web

      - name: Lint @agentlint/web
        run: npm run lint -w @agentlint/web

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Test @agentlint/web (e2e)
        run: npm run test:e2e -w @agentlint/web

  # Dependency audit runs as a SEPARATE, non-blocking job so a freshly disclosed
  # advisory never red-bars an otherwise-passing PR. Production deps only.
  audit:
    name: npm audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev || true
