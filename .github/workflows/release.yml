name: Release

# Publish agentlint-core then the agentlint CLI to npm when a version tag is
# pushed (e.g. `git tag v1.1.0 && git push --tags`). Core is published FIRST so
# the CLI's `agentlint-core` dependency resolves for fresh installs. Requires an
# `NPM_TOKEN` repository secret with publish rights.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: build, test & publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish agentlint-core
        run: npm publish --workspace agentlint-core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish agentlint (CLI)
        run: npm publish --workspace agentlint-cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
